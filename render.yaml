services:
  - type: web
    name: hammasurvey-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: MONGO_URI
        sync: false
      - key: DASHBOARD_PASSKEY
        sync: false
      - key: CLIENT_URL
        sync: false

  - type: web
    name: hammasurvey-frontend
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
